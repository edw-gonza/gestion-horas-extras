# ==============================================
# CONFIGURACIÓN DE BASE DE DATOS H2 EN ARCHIVO
# ==============================================

spring.datasource.url=jdbc:h2:file:./bancolombia_data;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=org.h2.Driver

# ==============================================
# CONFIGURACIÓN DE JPA
# ==============================================

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================
# CONSOLA WEB DE H2
# ==============================================

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================================
# CONFIGURACIÓN DE SPRING BOOT GENERAL
# ==============================================

server.port=8080
spring.main.allow-circular-references=true
spring.application.name=gestion-horas-extras

# ==============================================
# CONFIGURACIÓN DE RECURSOS ESTÁTICOS
# ==============================================

spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
server.port=${PORT:8080}