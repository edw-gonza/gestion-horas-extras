<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Colaboradores</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/menu.css">
    <style>
        .table-container {
            max-height: 450px;
            overflow-y: auto;
        }
        .table th {
            position: sticky;
            top: 0;
            background: #0d6efd;
            color: white;
            z-index: 10;
        }
        .inactivo-row {
            background-color: #f8d7da !important;
            opacity: 0.7;
        }
        .header-title {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }
        .card-shadow {
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: none;
        }
        .btn-group-custom {
            margin: 10px 0;
        }
        .badge-rol {
            font-size: 0.8rem;
            padding: 5px 12px;
        }
    </style>
</head>
<script src="/js/menu.js"></script>
<body>

<div class="container mt-4" style="padding-top: 80px;">
    <!-- TÍTULO -->
    <div class="header-title text-center">
        <h1><i class="fas fa-users"></i> Gestión de Colaboradores</h1>
        <p class="mb-0">Administra el catálogo de asesores de tu sucursal</p>
    </div>

    <!-- BARRA DE ACCIONES -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap">
        <div>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#colaboradorModal" onclick="abrirModalNuevo()">
                <i class="fas fa-plus-circle"></i> Nuevo Colaborador
            </button>
            <button class="btn btn-outline-secondary" onclick="cargarColaboradores()">
                <i class="fas fa-sync-alt"></i> Actualizar
            </button>
        </div>
        <div>
            <span class="badge bg-primary fs-6" id="totalActivos">Activos: 0</span>
            <span class="badge bg-secondary fs-6 ms-2" id="totalInactivos">Inactivos: 0</span>
        </div>
    </div>

    <!-- TABLA DE COLABORADORES -->
    <div class="card card-shadow">
        <div class="card-body p-0">
            <div class="table-container">
                <table class="table table-hover mb-0" id="tablaColaboradores">
                    <thead>
                        <tr>
                            <th style="width: 60px;">#</th>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Rol</th>
                            <th>Horario</th>
                            <th>Horas Sem.</th>
                            <th>Sucursal</th>
                            <th>Estado</th>
                            <th style="width: 160px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cuerpoTabla">
                        <tr>
                            <td colspan="10" class="text-center text-muted py-4">
                                <i class="fas fa-spinner fa-spin"></i> Cargando colaboradores...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- ======== MODAL PARA CREAR/EDITAR ======== -->
<div class="modal fade" id="colaboradorModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle"><i class="fas fa-user-plus"></i> Nuevo Colaborador</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formColaborador">
                    <input type="hidden" id="id" name="id">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Código de Ventas *</label>
                            <input type="text" class="form-control" id="codigoVentas" required placeholder="Ej: V001">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nombre Completo *</label>
                            <input type="text" class="form-control" id="nombreCompleto" required placeholder="Ej: Ana Pérez">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Correo Electrónico *</label>
                            <input type="email" class="form-control" id="correo" required placeholder="ejemplo@bancolombia.com">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Fecha de Nacimiento *</label>
                            <input type="date" class="form-control" id="fechaNacimiento" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Rol *</label>
                            <select class="form-select" id="rol" required>
                                <option value="ASESORIA">ASESORÍA</option>
                                <option value="SERVICIO">SERVICIO</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Horario *</label>
                            <select class="form-select" id="horario" required>
                                <option value="LUNES_VIERNES">Lunes a Viernes</option>
                                <option value="LUNES_SABADO">Lunes a Sábado</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Horas Semanales *</label>
                            <input type="number" class="form-control" id="horasSemanales" required min="20" max="60" value="42">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Hora Entrada *</label>
                            <input type="time" class="form-control" id="horaEntradaEstandar" required value="08:00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Hora Salida *</label>
                            <input type="time" class="form-control" id="horaSalidaEstandar" required value="17:00">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Sucursal *</label>
                            <input type="text" class="form-control" id="sucursal" required placeholder="Ej: Principal, Norte">
                        </div>
                        <div class="col-md-6 mb-3 d-flex align-items-center">
                            <div class="form-check form-switch mt-4">
                                <input class="form-check-input" type="checkbox" id="activo" checked>
                                <label class="form-check-label fw-bold" for="activo">Colaborador Activo</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnGuardar">
                    <i class="fas fa-save"></i> Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script de la aplicación -->
<script src="/js/colaboradores.js"></script>

</body>
</html>
